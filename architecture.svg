<svg width="1120" height="430" viewBox="0 0 1120 430" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="1120" height="430" fill="#FFFFFF"/>
  <text x="40" y="44" font-size="20" font-weight="700" fill="#0F2A43">Finnish Electricity Market Analytics — Databricks Lakehouse</text>
  <text x="40" y="68" font-size="13" fill="#64748B">Code-first PySpark medallion · real Finnish open data · Spark ML demand forecast</text>

  <!-- ── Sources column ── -->
  <text x="40" y="110" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="1">SOURCES</text>
  <g>
    <rect x="40" y="124" width="170" height="46" rx="8" fill="#EAF2FB" stroke="#B9CDE8"/>
    <text x="56" y="148" font-size="12.5" font-weight="700" fill="#1E3A5F">Fingrid API</text>
    <text x="56" y="163" font-size="10.5" fill="#64748B">consumption · production mix</text>

    <rect x="40" y="186" width="170" height="46" rx="8" fill="#EAF2FB" stroke="#B9CDE8"/>
    <text x="56" y="210" font-size="12.5" font-weight="700" fill="#1E3A5F">ENTSO-E API</text>
    <text x="56" y="225" font-size="10.5" fill="#64748B">day-ahead spot price</text>

    <rect x="40" y="248" width="170" height="46" rx="8" fill="#EAF2FB" stroke="#B9CDE8"/>
    <text x="56" y="272" font-size="12.5" font-weight="700" fill="#1E3A5F">FMI API</text>
    <text x="56" y="287" font-size="10.5" fill="#64748B">temperature · wind speed</text>
  </g>

  <!-- arrows sources -> bronze -->
  <g stroke="#CBD5E1" stroke-width="2" marker-end="url(#arr)">
    <line x1="214" y1="147" x2="262" y2="200"/>
    <line x1="214" y1="209" x2="262" y2="209"/>
    <line x1="214" y1="271" x2="262" y2="220"/>
  </g>

  <!-- ── Medallion stages ── -->
  <!-- Bronze -->
  <rect x="266" y="124" width="178" height="170" rx="12" fill="#FBF1E3" stroke="#E6C39C" stroke-width="1.5"/>
  <text x="284" y="152" font-size="14" font-weight="700" fill="#9A5B1E">🟤 BRONZE</text>
  <text x="284" y="174" font-size="11" fill="#475569">raw, as-fetched</text>
  <text x="284" y="196" font-size="11" fill="#475569">8 Delta tables</text>
  <text x="284" y="214" font-size="11" fill="#475569">1.2M+ rows</text>
  <text x="284" y="246" font-size="10.5" fill="#94A3B8">PySpark: parse ·</text>
  <text x="284" y="261" font-size="10.5" fill="#94A3B8">type · dedupe</text>

  <!-- Silver -->
  <rect x="468" y="124" width="178" height="170" rx="12" fill="#EEF2F6" stroke="#C2CCD6" stroke-width="1.5"/>
  <text x="486" y="152" font-size="14" font-weight="700" fill="#5B6B7B">⚪ SILVER</text>
  <text x="486" y="174" font-size="11" fill="#475569">clean &amp; conformed</text>
  <text x="486" y="196" font-size="11" fill="#475569">silver_energy_hourly</text>
  <text x="486" y="211" font-size="11" fill="#475569">+ dim_date</text>
  <text x="486" y="243" font-size="10.5" fill="#94A3B8">resample → hourly ·</text>
  <text x="486" y="258" font-size="10.5" fill="#94A3B8">units → MWh/h · join</text>
  <text x="486" y="273" font-size="10.5" fill="#94A3B8">Helsinki calendar</text>

  <!-- Gold -->
  <rect x="670" y="124" width="178" height="170" rx="12" fill="#FCF6E0" stroke="#E4D08A" stroke-width="1.5"/>
  <text x="688" y="152" font-size="14" font-weight="700" fill="#9A7B1E">🟡 GOLD</text>
  <text x="688" y="174" font-size="11" fill="#475569">marts + ML</text>
  <text x="688" y="196" font-size="11" fill="#475569">gold_daily</text>
  <text x="688" y="211" font-size="11" fill="#475569">gold_hour_of_day</text>
  <text x="688" y="226" font-size="11" fill="#475569">gold_demand_forecast</text>
  <text x="688" y="258" font-size="10.5" fill="#94A3B8">Spark ML (GBT)</text>
  <text x="688" y="273" font-size="10.5" fill="#94A3B8">MAE 3.8% · R² 0.74</text>

  <!-- Dashboard -->
  <rect x="872" y="124" width="178" height="170" rx="12" fill="#E9F6F1" stroke="#9FD3C2" stroke-width="1.5"/>
  <text x="890" y="152" font-size="14" font-weight="700" fill="#1E7A5F">📊 AI/BI</text>
  <text x="890" y="174" font-size="11" fill="#475569">Databricks dashboard</text>
  <text x="890" y="196" font-size="11" fill="#475569">balance · price · mix</text>
  <text x="890" y="211" font-size="11" fill="#475569">hourly profile</text>
  <text x="890" y="226" font-size="11" fill="#475569">forecast vs actual</text>
  <text x="890" y="266" font-size="10.5" fill="#94A3B8">6 datasets · 6 visuals</text>

  <!-- stage arrows -->
  <g stroke="#94A3B8" stroke-width="2.5" marker-end="url(#arr)">
    <line x1="444" y1="209" x2="466" y2="209"/>
    <line x1="646" y1="209" x2="668" y2="209"/>
    <line x1="848" y1="209" x2="870" y2="209"/>
  </g>

  <!-- footer tech bar -->
  <rect x="40" y="330" width="1010" height="60" rx="10" fill="#0F2A43"/>
  <text x="60" y="357" font-size="12" font-weight="700" fill="#7FE6D2">STACK</text>
  <text x="60" y="377" font-size="12" fill="#D6E2EC">Databricks (serverless) · PySpark · Spark ML · Delta Lake · Unity Catalog · SQL · Python · REST/WFS APIs</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
</svg>
